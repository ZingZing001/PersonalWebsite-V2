name = "ask-johnson"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Allowed origins for CORS. Set to your production site(s).
# Local dev origins (http://localhost:5173) are also allowed automatically.
[vars]
ALLOWED_ORIGINS = "https://zingzing001.github.io"
# Any OpenRouter model slug — swap without code changes. See https://openrouter.ai/models
# "openrouter/free" auto-routes across free models (https://openrouter.ai/openrouter/free).
OPENROUTER_MODEL = "openrouter/free"
# Optional: shown in your OpenRouter dashboard analytics.
SITE_URL = "https://zingzing001.github.io/PersonalWebsite-V2/"
SITE_TITLE = "Ask Virtual Johnson"

# KV namespace for per-IP rate limiting.
# Create with: wrangler kv:namespace create RATE_LIMIT
# Then paste the returned `id` below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "c2fa8b603e2b4a9cb7343a26873163fb"

# D1 database for visitor-question analytics.
# Create with: wrangler d1 create ask-johnson-analytics
# Then paste the returned database_id below, and apply the migration:
#   wrangler d1 execute ask-johnson-analytics --remote --file migrations/0001_init.sql
[[d1_databases]]
binding = "DB"
database_name = "ask-johnson-analytics"
database_id = "6eac744c-c99f-44f8-99e7-cd4c4344c871"

# Secrets are set with: wrangler secret put <NAME>
#   OPENROUTER_API_KEY — required, OpenRouter API key (https://openrouter.ai/keys)
#   VOYAGE_API_KEY     — required, Voyage AI embeddings key
#   ADMIN_TOKEN        — required for /admin/stats; any long random string
