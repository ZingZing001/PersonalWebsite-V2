<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1f"/>
      <stop offset="1" stop-color="#13112b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b7cf0"/>
      <stop offset="1" stop-color="#6c5ce7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b7cf0"/>
    </marker>
    <marker id="arrowBack" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5eead4"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- subtle stars -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="120" cy="80" r="1.4"/><circle cx="380" cy="55" r="1"/><circle cx="900" cy="70" r="1.6"/>
    <circle cx="1080" cy="120" r="1.1"/><circle cx="60" cy="300" r="1.2"/><circle cx="1140" cy="380" r="1.3"/>
    <circle cx="520" cy="600" r="1"/><circle cx="760" cy="585" r="1.4"/><circle cx="240" cy="560" r="1.1"/>
  </g>

  <text x="600" y="62" text-anchor="middle" fill="#c7bcff" font-size="34" font-weight="700">How Virtual Johnson Answers — a RAG Pipeline</text>
  <text x="600" y="96" text-anchor="middle" fill="#8a93b2" font-size="18">Retrieval-Augmented Generation on a Cloudflare Worker</text>

  <!-- Browser -->
  <rect x="48" y="250" width="210" height="120" rx="16" fill="#161a30" stroke="#8b7cf0" stroke-width="2"/>
  <text x="153" y="298" text-anchor="middle" fill="#e6e9f5" font-size="22" font-weight="600">Browser</text>
  <text x="153" y="326" text-anchor="middle" fill="#9aa3c0" font-size="15">React · Ask Me</text>
  <text x="153" y="348" text-anchor="middle" fill="#9aa3c0" font-size="15">page</text>

  <!-- Worker container -->
  <rect x="358" y="150" width="430" height="330" rx="18" fill="#12162a" stroke="#3b3f5e" stroke-width="2"/>
  <text x="573" y="184" text-anchor="middle" fill="#c7bcff" font-size="21" font-weight="700">Cloudflare Worker · /chat</text>

  <!-- steps -->
  <rect x="388" y="208" width="370" height="62" rx="12" fill="#1b2140" stroke="#8b7cf0" stroke-width="1.5"/>
  <text x="412" y="236" fill="#e6e9f5" font-size="17" font-weight="600">1 · Embed the question</text>
  <text x="412" y="258" fill="#9aa3c0" font-size="14">Voyage voyage-3 → 1024-dim vector</text>

  <rect x="388" y="286" width="370" height="62" rx="12" fill="#1b2140" stroke="#8b7cf0" stroke-width="1.5"/>
  <text x="412" y="314" fill="#e6e9f5" font-size="17" font-weight="600">2 · Retrieve top-3 chunks</text>
  <text x="412" y="336" fill="#9aa3c0" font-size="14">cosine similarity vs. knowledge base</text>

  <rect x="388" y="364" width="370" height="62" rx="12" fill="#1b2140" stroke="#8b7cf0" stroke-width="1.5"/>
  <text x="412" y="392" fill="#e6e9f5" font-size="17" font-weight="600">3 · Assemble the prompt</text>
  <text x="412" y="414" fill="#9aa3c0" font-size="14">system + context + chat history</text>

  <!-- Knowledge base cylinder -->
  <g>
    <ellipse cx="573" cy="520" rx="120" ry="18" fill="#1b2140" stroke="#5eead4" stroke-width="1.5"/>
    <path d="M453,520 v40 a120,18 0 0 0 240,0 v-40" fill="#1b2140" stroke="#5eead4" stroke-width="1.5"/>
    <text x="573" y="556" text-anchor="middle" fill="#cfeee7" font-size="15" font-weight="600">Knowledge base</text>
    <text x="573" y="576" text-anchor="middle" fill="#8a93b2" font-size="13">blog posts + CV · 42 chunks</text>
  </g>
  <line x1="573" y1="426" x2="573" y2="500" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#arrowBack)"/>

  <!-- OpenRouter -->
  <rect x="888" y="250" width="220" height="120" rx="16" fill="#161a30" stroke="#8b7cf0" stroke-width="2"/>
  <text x="998" y="298" text-anchor="middle" fill="#e6e9f5" font-size="22" font-weight="600">OpenRouter</text>
  <text x="998" y="326" text-anchor="middle" fill="#9aa3c0" font-size="15">free LLM router</text>
  <text x="998" y="348" text-anchor="middle" fill="#9aa3c0" font-size="15">streams the answer</text>

  <!-- arrows -->
  <line x1="262" y1="292" x2="352" y2="292" stroke="#8b7cf0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="307" y="280" text-anchor="middle" fill="#9aa3c0" font-size="13">POST</text>

  <line x1="792" y1="292" x2="882" y2="292" stroke="#8b7cf0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="837" y="280" text-anchor="middle" fill="#9aa3c0" font-size="13">prompt</text>

  <!-- return stream (routed above the worker so it doesn't cross the inner steps) -->
  <path d="M998,250 V130 H153 V250" fill="none" stroke="#5eead4" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBack)"/>
  <text x="575" y="122" text-anchor="middle" fill="#5eead4" font-size="14" font-weight="600">streamed tokens · Server-Sent Events</text>
</svg>
